<svg xmlns="http://www.w3.org/2000/svg" width="600" height="900" viewBox="0 0 600 900" role="img" aria-label="Clean Code cover">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#000" flood-opacity="0.22"/>
    </filter>
  </defs>
  <rect width="600" height="900" fill="#f4f4f5"/>
  <rect x="52" y="60" width="496" height="780" rx="26" fill="url(#bg)" filter="url(#shadow)"/>
  <rect x="80" y="100" width="440" height="700" rx="20" fill="rgba(255,255,255,0.10)" />
  <text x="110" y="210" font-family="Segoe UI, system-ui, sans-serif" font-size="44" font-weight="800" fill="#ffffff">
    Clean Code
  </text>
  <text x="110" y="260" font-family="Segoe UI, system-ui, sans-serif" font-size="22" fill="rgba(255,255,255,0.85)">
    Robert C. Martin
  </text>
  <path d="M110 330h380" stroke="rgba(255,255,255,0.35)" stroke-width="6" stroke-linecap="round"/>
  <g opacity="0.9">
    <rect x="110" y="380" width="380" height="18" rx="9" fill="rgba(255,255,255,0.26)"/>
    <rect x="110" y="420" width="320" height="14" rx="7" fill="rgba(255,255,255,0.18)"/>
    <rect x="110" y="455" width="350" height="14" rx="7" fill="rgba(255,255,255,0.18)"/>
    <rect x="110" y="490" width="280" height="14" rx="7" fill="rgba(255,255,255,0.18)"/>
  </g>
  <text x="110" y="780" font-family="Segoe UI, system-ui, sans-serif" font-size="18" fill="rgba(255,255,255,0.75)">
    Bookstore edition
  </text>
</svg>
