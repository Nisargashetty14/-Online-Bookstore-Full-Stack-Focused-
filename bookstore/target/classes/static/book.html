<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Book details</title>
    <link rel="stylesheet" href="/css/bookstore.css" />
  </head>
  <body>
    <header class="site">
      <div class="inner">
        <a class="brand" href="/">📚 Bookstore</a>
        <nav>
          <a href="/">Home</a>
          <a href="/cart.html">Cart</a>
        </nav>
      </div>
    </header>
    <div class="wrap">
      <p><a href="/">← Back to catalog</a></p>
      <div id="err" class="notice error" style="display: none"></div>
      <div id="main"></div>
    </div>
    <script src="/js/api.js"></script>
    <script>
      const params = new URLSearchParams(location.search);
      const id = parseInt(params.get("id"), 10);
      const main = document.getElementById("main");
      const err = document.getElementById("err");

      function showError(msg) {
        err.textContent = msg;
        err.style.display = "block";
      }

      function stars(n) {
        const r = Math.min(5, Math.max(0, Number(n) || 0));
        return "★".repeat(r) + "☆".repeat(5 - r);
      }

      async function load() {
        if (!id) {
          main.innerHTML = "<p>Missing book id.</p>";
          return;
        }
        try {
          const book = await api.book(id);
          if (!book) {
            main.innerHTML = "<p>Book not found.</p>";
            return;
          }
          const reviews = (await api.reviews(id)) || [];

          main.innerHTML = `
            <div class="detail-layout">
              <img src="${book.imageUrl || "/img/cover.svg"}" alt="" width="280" height="420" onerror="this.onerror=null;this.src='/img/cover.svg';" />
              <div class="detail-body">
                <h1>${escapeHtml(book.title)}</h1>
                <p class="muted">${escapeHtml(book.author)}</p>
                <p class="price">${money(book.price)}</p>
                <p>${escapeHtml(book.description || "")}</p>
                <p>
                  <button type="button" class="btn" id="addBtn">Add to cart</button>
                </p>
                <p id="cartMsg" class="muted" style="min-height:1.5em"></p>
              </div>
            </div>
            <section class="reviews">
              <h2>Reviews</h2>
              <div id="reviewList">
                ${reviews.length ? reviews.map((r) => reviewHtml(r)).join("") : "<p class='muted'>No reviews yet.</p>"}
              </div>
              <h3 style="margin-top:1.5rem">Add a review</h3>
              <form class="compact" id="revForm">
                <label>Your name <input name="authorName" required maxlength="120" /></label>
                <label>Rating (1–5) <input name="rating" type="number" min="1" max="5" value="5" required /></label>
                <label>Comment <textarea name="comment" rows="3" required maxlength="2000"></textarea></label>
                <p><button type="submit" class="btn secondary">Submit review</button></p>
              </form>
            </section>`;

          document.getElementById("addBtn").addEventListener("click", async () => {
            const msg = document.getElementById("cartMsg");
            msg.textContent = "Adding…";
            try {
              await api.addToCart(book.id, 1);
              msg.textContent = "Added to cart.";
            } catch (e) {
              msg.textContent = e.message || "Failed.";
            }
          });

          document.getElementById("revForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const fd = new FormData(e.target);
            try {
              await api.addReview(id, {
                authorName: fd.get("authorName"),
                rating: Number(fd.get("rating")),
                comment: fd.get("comment"),
              });
              const list = document.getElementById("reviewList");
              const next = await api.reviews(id);
              list.innerHTML = next.map((r) => reviewHtml(r)).join("");
              e.target.reset();
            } catch (ex) {
              showError(ex.message || "Review failed");
            }
          });
        } catch (e) {
          showError(e.message || "Load failed");
        }
      }

      function reviewHtml(r) {
        const when = r.createdAt ? new Date(r.createdAt).toLocaleString() : "";
        return `<div class="review">
          <div class="meta">${escapeHtml(r.authorName)} · ${stars(r.rating)} · ${when}</div>
          <div>${escapeHtml(r.comment)}</div>
        </div>`;
      }

      function escapeHtml(s) {
        const d = document.createElement("div");
        d.textContent = s == null ? "" : String(s);
        return d.innerHTML;
      }

      load();
    </script>
  </body>
</html>
